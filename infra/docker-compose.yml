services:
  bitcoind:
    image: bitcoin/bitcoin:28.0
    container_name: harbor-bitcoind
    ports:
      - "18443:18443"
      - "18444:18444"
    volumes:
      - ./regtest-data:/home/bitcoin/.bitcoin
      - ./bitcoin.conf:/home/bitcoin/.bitcoin/bitcoin.conf:ro
    command:
      - -regtest
      - -server
      - -rpcbind=0.0.0.0
      - -rpcallowip=0.0.0.0/0
      - -rpcuser=harbor
      - -rpcpassword=harbor-regtest
      - -fallbackfee=0.0002
      - -txindex=1
      - -printtoconsole
    healthcheck:
      test: ["CMD", "bitcoin-cli", "-regtest", "-rpcuser=harbor", "-rpcpassword=harbor-regtest", "getblockchaininfo"]
      interval: 3s
      timeout: 5s
      retries: 20
